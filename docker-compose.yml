version: '3.8'

services:
  bot1:
    build: .
    container_name: cs2_bot_1
    volumes:
      - /home/cs.serkaneken.com/cs2_merged/bot1:/home/steamuser/cs2_merged
    environment:
      - BOT_ID=1
      - ACCOUNT_USER=${USER_1}
      - ACCOUNT_PASS=${PASS_1}
      - ACCOUNT_SHARED_SECRET=${SECRET_1}
      - SOCKS5_PROXY=${PROXY_1}
      - LOBBY_ID=LOBBY_A
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    user: "1000:1000"
    shm_size: '2gb'
    healthcheck:
      test: ["CMD", "pgrep", "-f", "node"]
      interval: 30s
      timeout: 10s
      retries: 3

